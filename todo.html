<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced To-Do List</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #71b7e6, #9b59b6);
        height: 100vh; display:flex; justify-content:center; align-items:center;
        color:#333;
    }

    .container {
        background-color: #fff; width: 400px; border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2); padding: 25px 30px;
        display: flex; flex-direction: column; gap: 15px;
    }

    h2 { text-align:center; font-weight:600; color:#6c5ce7; letter-spacing:1px; }

    .input-group { display:flex; gap:10px; }
    input[type="text"] {
        flex:1; padding:10px 15px; border-radius:50px; border:1px solid #ccc;
        outline:none; transition:0.3s;
    }
    input[type="text"]:focus {
        border-color:#6c5ce7; box-shadow:0 0 5px rgba(108,92,231,0.5);
    }

    button {
        padding:10px 20px; border-radius:50px; border:none;
        background-color:#6c5ce7; color:white; font-weight:600; cursor:pointer;
        transition:0.3s;
    }
    button:hover { background-color:#341f97; }

    .task-buttons { display:flex; justify-content:space-between; gap:5px; flex-wrap:wrap; }
    .task-buttons button { flex:1; font-size:0.9rem; padding:8px; }

    ul { list-style:none; display:flex; flex-direction:column; gap:10px; max-height:300px; overflow-y:auto; }

    li {
        background-color: #f1f2f6; padding:12px 15px; border-radius:10px;
        display:flex; justify-content:space-between; align-items:center;
        transition:0.3s; cursor:pointer;
    }
    li:hover { background-color:#dfe6e9; }
    li.completed { text-decoration:line-through; color:#aaa; background-color:#dfe6e9; }

    .delete-btn { background-color:#ff6b6b; border:none; padding:5px 10px;
        color:white; border-radius:50px; cursor:pointer; transition:0.3s; }
    .delete-btn:hover { background-color:#c0392b; }

    .filter-buttons { display:flex; justify-content:center; gap:10px; margin-top:10px; }
    .filter-buttons button { padding:5px 10px; border-radius:50px; font-size:0.9rem; flex:1; }
</style>
</head>
<body>
<div class="container">
    <h2>My Tasks</h2>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Add a new task...">
        <button onclick="addTask()">Add</button>
    </div>
   
    <div class="input-group">
       <input type="text" id="searchInput" placeholder="Search tasks..." onkeyup="searchTasks()">
    </div>
   
    <div class="task-buttons">
        <button onclick="markAllCompleted()">Mark All Completed</button>
        <button onclick="clearCompleted()">Clear Completed</button>
        <button onclick="clearAll()">Clear All</button>
    </div>

    <ul id="taskList"></ul>

    <div class="filter-buttons">
        <button onclick="filterTasks('all')">All</button>
        <button onclick="filterTasks('active')">Active</button>
        <button onclick="filterTasks('completed')">Completed</button>
    </div>
</div>

<script>
    function addTask() {
        const taskInput = document.getElementById('taskInput');
        const taskText = taskInput.value.trim();
        if(taskText === '') return;

        const li = document.createElement('li');
        li.textContent = taskText;

        li.addEventListener('click', () => { li.classList.toggle('completed'); });

        const delBtn = document.createElement('button');
        delBtn.textContent = 'Delete';
        delBtn.className = 'delete-btn';
        delBtn.addEventListener('click', (e) => { e.stopPropagation(); li.remove(); });

        li.appendChild(delBtn);
        document.getElementById('taskList').appendChild(li);
        taskInput.value = '';
    }

    document.getElementById('taskInput').addEventListener('keypress', function(e){
        if(e.key === 'Enter') addTask();
    });

    function markAllCompleted() {
        document.querySelectorAll('#taskList li').forEach(li => li.classList.add('completed'));
    }

    function clearCompleted() {
        document.querySelectorAll('#taskList li.completed').forEach(li => li.remove());
    }

    function clearAll() {
        document.querySelectorAll('#taskList li').forEach(li => li.remove());
    }

    function filterTasks(type) {
        const tasks = document.querySelectorAll('#taskList li');
        tasks.forEach(task => {
            task.style.display = 'flex'; // reset
            if(type === 'active' && task.classList.contains('completed')) task.style.display='none';
            if(type === 'completed' && !task.classList.contains('completed')) task.style.display='none';
        });
    }
   function searchTasks() {
    const searchValue = document.getElementById('searchInput').value.toLowerCase();
    const tasks = document.querySelectorAll('#taskList li');

    tasks.forEach(task => {
        const text = task.firstChild.textContent.toLowerCase(); // ignore Delete button text
        if(text.includes(searchValue)) {
            task.style.display = 'flex';
        } else {
            task.style.display = 'none';
        }
    });
}
</script>
</body>
</html>
