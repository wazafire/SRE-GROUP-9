<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List with Priority</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #71b7e6, #9b59b6);
            height: 100vh; display:flex; justify-content:center; align-items:center;
            color:#333;
        }
        .container {
            background-color: #fff; width: 400px; border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); padding: 25px 30px;
            display: flex; flex-direction: column; gap: 15px;
        }
        h2 { text-align:center; font-weight:600; color:#6c5ce7; }
        .input-group { display:flex; gap:10px; }
        input[type="text"], select {
            padding:10px; border-radius:5px; border:1px solid #ccc; outline:none;
        }
        input[type="text"] { flex:2; }
        select { flex:1; cursor:pointer; }
        button {
            padding:10px; border-radius:5px; border:none;
            background-color:#6c5ce7; color:white; cursor:pointer;
        }
        ul { list-style:none; margin-top: 20px; }
        li {
            background: #f9f9f9; margin-bottom: 10px; padding: 10px;
            border-radius: 5px; display: flex; justify-content: space-between;
        }
        .priority-label { font-weight: bold; color: #6c5ce7; margin-left: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>My Tasks</h2>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Add a new task...">
        <select id="priorityInput">
            <option value="Low">Low</option>
            <option value="Med">Med</option>
            <option value="High">High</option>
        </select>
        <button onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
</div>

<script>
    function addTask() {
        const input = document.getElementById('taskInput');
        const priority = document.getElementById('priorityInput');
        const list = document.getElementById('taskList');
        
        if (input.value.trim() === "") return;

        const li = document.createElement('li');
        li.innerHTML = `
            <span>${input.value} <span class="priority-label">[${priority.value}]</span></span>
            <button onclick="this.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer;">Delete</button>
        `;
        list.appendChild(li);
        input.value = "";
    }
</script>
</body>
</html>
